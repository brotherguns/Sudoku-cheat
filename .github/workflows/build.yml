name: Build SudokuSolver Tweak

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Theos dependencies ──────────────────────────────────────────────
      - name: Install build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -yq \
            git curl make fakeroot dpkg-dev \
            libtinfo6 clang lld lzma \
            libplist-utils

      # ── Theos setup ─────────────────────────────────────────────────────
      - name: Cache Theos
        id: cache-theos
        uses: actions/cache@v4
        with:
          path: /opt/theos
          key: theos-${{ runner.os }}-${{ hashFiles('.github/workflows/build.yml') }}

      - name: Install Theos
        if: steps.cache-theos.outputs.cache-hit != 'true'
        run: |
          git clone --recursive https://github.com/theos/theos.git /opt/theos

      # ── iOS cross-compilation toolchain ─────────────────────────────────
      - name: Cache toolchain
        id: cache-toolchain
        uses: actions/cache@v4
        with:
          path: /opt/theos/toolchain/linux/iphone
          key: theos-toolchain-sbingner-latest

      - name: Install iOS toolchain
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          curl -fsSL \
            "https://github.com/sbingner/llvm-project/releases/latest/download/linux-ios-arm64e-clang-toolchain.tar.lzma" \
            -o /tmp/toolchain.tar.lzma
          TMP=$(mktemp -d)
          tar --lzma -xf /tmp/toolchain.tar.lzma -C "$TMP"
          mkdir -p /opt/theos/toolchain/linux/iphone
          mv "$TMP"/ios-arm64e-clang-toolchain/* /opt/theos/toolchain/linux/iphone/
          rm -rf /tmp/toolchain.tar.lzma "$TMP"

      # libtinfo.so.5 shim — Ubuntu 24.04 only ships v6
      - name: Symlink libtinfo.so.5
        run: |
          if [ ! -f /lib/x86_64-linux-gnu/libtinfo.so.5 ]; then
            sudo ln -s /lib/x86_64-linux-gnu/libtinfo.so.6 \
                       /lib/x86_64-linux-gnu/libtinfo.so.5
          fi


      # ── iOS SDK ─────────────────────────────────────────────────────────
      - name: Cache iOS SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: /opt/theos/sdks
          key: sdks-iPhoneOS16.5-master-146e41f

      - name: Download iOS 16.5 SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          mkdir -p /opt/theos/sdks
          curl -fsSL \
            "https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS16.5.sdk.tar.xz" \
            -o /tmp/sdk.tar.xz
          tar -xJf /tmp/sdk.tar.xz -C /opt/theos/sdks
          rm /tmp/sdk.tar.xz

      # ── ldid (code-signing tool required by Theos) ───────────────────────
      - name: Cache ldid
        id: cache-ldid
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/ldid
          key: ldid-v2.1.5-linux

      - name: Install ldid
        if: steps.cache-ldid.outputs.cache-hit != 'true'
        run: |
          curl -L \
            "https://github.com/ProcursusTeam/ldid/releases/download/v2.1.5-procursus7/ldid_linux_x86_64" \
            -o /usr/local/bin/ldid
          chmod +x /usr/local/bin/ldid

      # ── Build ────────────────────────────────────────────────────────────
      - name: Build .deb package
        env:
          THEOS: /opt/theos
        run: make package FINALPACKAGE=1

      # ── Upload artifact ──────────────────────────────────────────────────
      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: SudokuSolver-deb
          path: packages/*.deb
          if-no-files-found: error
