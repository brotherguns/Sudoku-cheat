name: Build Tweak

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    env:
      THEOS: ${{ github.workspace }}/theos
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install ldid dpkg make xz

      - name: Setup Theos
        run: |
          set -e
          git clone --recursive --depth 1 https://github.com/theos/theos.git $THEOS
          curl -fsSL https://github.com/theos/sdks/archive/master.tar.gz \
            | tar xz -C $THEOS/sdks --strip-components=1

      - name: Build (rootless)
        run: make package FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless

      - name: Build (rootful)
        run: |
          make clean
          make package FINALPACKAGE=1

      - name: Upload debs
        uses: actions/upload-artifact@v4
        with:
          name: SudokuSolver
          path: packages/*.deb
